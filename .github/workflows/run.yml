name: LeetCode Competition Tracker

on:
  schedule:
    # Runs every 1 hour
    - cron: "0 * * * *"


concurrency:
  group: leetcode-tracker
  cancel-in-progress: true

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  MY_USERNAME: ${{ secrets.MY_USERNAME }}
  OPPONENT_USERNAMES: ${{ secrets.OPPONENT_USERNAMES }}
  GIST_ID: ${{ secrets.GIST_ID }}
  GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

jobs:
  track:
    name: Check LeetCode Activity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracker
        run: |
          if [ "${{ github.event.inputs.mode }}" = "leaderboard" ]; then
            python main.py leaderboard
          else
            python main.py
          fi