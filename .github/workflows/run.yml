name: LeetCode Competition Tracker

on:
  schedule:
    # Runs every 2 hours
    - cron: "0 */2 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: check or leaderboard"
        required: false
        default: "check"

concurrency:
  group: leetcode-tracker
  cancel-in-progress: true

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  MY_USERNAME: ${{ secrets.MY_USERNAME }}
  OPPONENT_USERNAMES: ${{ secrets.OPPONENT_USERNAMES }}
  GIST_ID: ${{ secrets.GIST_ID }}
  GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

jobs:
  track:
    name: Check LeetCode Activity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracker
        run: |
          if [ "${{ github.event.inputs.mode }}" = "leaderboard" ]; then
            python main.py leaderboard
          else
            python main.py
          fi

  leaderboard:
    name: Daily Leaderboard
    runs-on: ubuntu-latest

    if: github.event_name == 'schedule'

    needs:
      - track

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send leaderboard
        run: |
          HOUR=$(date -u +%H)

          # Runs once per day at the 20:00 UTC schedule
          if [ "$HOUR" = "20" ]; then
            python main.py leaderboard
          else
            echo "Skipping leaderboard."
          fi